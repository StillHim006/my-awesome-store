<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS Whisper | Morning Class</title>
    <style>
        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1c, #03060c);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .neon-card {
            background: rgba(12, 20, 30, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h1 { color: #FFD966; text-align: center; margin-bottom: 5px; }
        .badge { text-align: center; font-size: 0.8rem; color: #9bb8da; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #FFDE9E; font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 12px; background: #0e1a1f; border: 1px solid #ffd96650;
            border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }
        textarea { height: 100px; resize: none; }
        button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(90deg, #FFC857, #FF9F2E);
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .response { margin-top: 20px; text-align: center; color: #C9F0A6; min-height: 24px; }
        .footer { font-size: 0.7rem; text-align: center; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="neon-card">
        <h1>📬 IMS Whisper</h1>
        <div class="badge">IMS Department • Third Year • Morning Class</div>
        <form id="msgForm">
            <div class="input-group">
                <label>Name (Optional)</label>
                <input type="text" id="name" placeholder="Leave blank for Unknown">
            </div>
            <div class="input-group">
                <label>Message *</label>
                <textarea id="message" required placeholder="Write your secret message..."></textarea>
            </div>
            <div class="input-group">
                <label>Send Method (Optional)</label>
                <input type="text" id="sendMethod" placeholder="e.g. Pigeon, Satellite">
            </div>
            <button type="submit" id="submitBtn">Send to the Ether</button>
        </form>
        <div id="responseArea" class="response"></div>
        <div class="footer">Dev: Alaa | Powered by Google Apps Script</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXSGkP6hL3SGyjPn9BaFiAACw-pPjlEvC9Dxi0RZWyWDu0VjYfUDjAvRECXWZnZSdX/exec";

        document.getElementById('msgForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resDiv = document.getElementById('responseArea');
            
            btn.disabled = true;
            btn.innerText = "Sending...";

            const payload = {
                name: document.getElementById('name').value,
                message: document.getElementById('message').value,
                sendMethod: document.getElementById('sendMethod').value
            };

            try {
                // Use 'no-cors' mode for GitHub Pages to Google Script compatibility
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                resDiv.innerText = "✅ Thank you for using our site";
                document.getElementById('msgForm').reset();
                
                setTimeout(() => { resDiv.innerText = ""; }, 5000);
            } catch (err) {
                resDiv.innerText = "❌ Error sending message.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Send to the Ether";
            }
        });
    </script>
</body>
</html>
