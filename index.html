<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS | Submit Your Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1c, #03060c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(12, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 32px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 650px;
            transition: 0.3s;
        }

        h1 {
            color: #FFD966;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .subhead {
            text-align: center;
            font-size: 0.85rem;
            color: #9bb8da;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a3a4a;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #FFDE9E;
        }

        .required-star {
            color: #ff7b72;
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0e1a1f;
            border: 1px solid #ffd96660;
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #FFC857;
            box-shadow: 0 0 8px rgba(255, 200, 80, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #FFC857, #FF9F2E);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            color: #1e2a2f;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.92;
            box-shadow: 0 8px 20px rgba(255, 200, 80, 0.3);
        }

        .response {
            margin-top: 20px;
            text-align: center;
            color: #c3e88d;
            font-weight: 500;
            min-height: 48px;
        }

        .view-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #b4c8ff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .view-link:hover {
            text-decoration: underline;
            color: #FFD966;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: #6c8aa0;
            border-top: 1px solid #2a3a4a;
            padding-top: 16px;
        }

        footer span {
            color: #FFD966;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>📚 IMS Example Exchange</h1>
    <div class="subhead">Department of Intelligent Medical Systems (IMS) • College of CS&IT • UOB</div>

    <form id="exampleForm">
        <div class="form-group">
            <label>Full Name <span class="required-star">*</span></label>
            <input type="text" id="fullName" required placeholder="e.g., Alaa Ahmed">
        </div>

        <div class="form-group">
            <label>Class <span class="required-star">*</span></label>
            <select id="classGroup" required>
                <option value="" disabled selected>– Select your class –</option>
                <option value="A">Class A</option>
                <option value="B">Class B</option>
            </select>
        </div>

        <div class="form-group">
            <label>The Example Idea <span class="required-star">*</span></label>
            <textarea id="idea" required placeholder="Describe your example idea clearly..."></textarea>
        </div>

        <div class="form-group">
            <label>If you have the example (code / screenshot / link – optional)</label>
            <textarea id="exampleContent" placeholder="Paste your code, link, or explanation here (optional)"></textarea>
        </div>

        <button type="submit" id="submitBtn">✨ Share Example ✨</button>
        <div id="responseArea" class="response"></div>
        <a href="view.html" class="view-link">📋 Show taken examples →</a>
    </form>

    <footer>
        🖥️ Developer: TD (a.k.a. Alaa The Great) • IMS • CS&IT • University of Basrah (UOB)
    </footer>
</div>

<script>
    // === REPLACE WITH YOUR GOOGLE APPS SCRIPT URL ===
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXSGkP6hL3SGyjPn9BaFiAACw-pPjlEvC9Dxi0RZWyWDu0VjYfUDjAvRECXWZnZSdX/exec";

    const form = document.getElementById('exampleForm');
    const submitBtn = document.getElementById('submitBtn');
    const responseDiv = document.getElementById('responseArea');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";

        const payload = {
            fullName: document.getElementById('fullName').value.trim(),
            classGroup: document.getElementById('classGroup').value,
            idea: document.getElementById('idea').value.trim(),
            exampleContent: document.getElementById('exampleContent').value.trim() || ""
        };

        try {
            // Using no-cors mode to avoid CORS issues (works with POST to Apps Script)
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            responseDiv.innerHTML = "✅ Your example has been recorded! Thank you.";
            form.reset();
            setTimeout(() => { responseDiv.innerHTML = ""; }, 5000);
        } catch (err) {
            responseDiv.innerHTML = "❌ Error: Could not submit. Check network or script URL.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "✨ Share Example ✨";
        }
    });
</script>
</body>
</html>
