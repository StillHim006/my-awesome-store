<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS | Submitted Examples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1c, #03060c);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 30px 20px;
            color: #eef4ff;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(10, 18, 28, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 28px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2rem;
            color: #FFD966;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: #9bb8da;
            margin-bottom: 30px;
            font-size: 0.9rem;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 12px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        button {
            background: #FFC857;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: #FF9F2E;
            transform: scale(1.02);
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .example-card {
            background: rgba(20, 30, 45, 0.7);
            border-left: 5px solid #FFD966;
            border-radius: 20px;
            padding: 20px;
            transition: 0.2s;
        }

        .example-card:hover {
            background: rgba(30, 45, 60, 0.8);
            transform: translateX(5px);
        }

        .card-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD966;
            margin-bottom: 12px;
            border-bottom: 1px dashed #FFD96680;
            padding-bottom: 6px;
        }

        .card-field {
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
        }

        .field-label {
            font-weight: bold;
            min-width: 110px;
            color: #FFDE9E;
        }

        .field-value {
            flex: 1;
            color: #eef4ff;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .field-value.empty {
            color: #aa8866;
            font-style: italic;
        }

        .status-msg {
            text-align: center;
            padding: 40px;
            color: #ffb570;
            font-style: italic;
        }

        footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.7rem;
            color: #6c8aa0;
            border-top: 1px solid #2a3a4a;
            padding-top: 20px;
        }

        a {
            color: #FFD966;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Submitted Examples</h1>
    <div class="sub">IMS Department • CS&IT • University of Basrah (UOB)</div>

    <div class="toolbar">
        <button id="refreshBtn">⟳ Refresh Data</button>
    </div>

    <div id="cardsContainer" class="cards-container">
        <div class="status-msg">Loading examples from Google Sheet...</div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" class="back-link">← Back to submission form</a>
    </div>

    <footer>
        🧠 Developer: TD (Alaa The Great) • IMS • CS&IT • University of Basrah
    </footer>
</div>

<script>
    const BASE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKtVzp4yiyWkfVRsJ0GQDBxv8siu9TB0eA5mptEs745Tm4WanTJ94zPlMGHvVopY5W/exec";

    // Robust CSV parser that handles quotes and commas inside fields
    function parseCSV(csvText) {
        const rows = [];
        let currentRow = [];
        let currentField = "";
        let inQuotes = false;
        let i = 0;
        const len = csvText.length;

        while (i < len) {
            const ch = csvText[i];
            if (ch === '"') {
                // Toggle quote mode
                inQuotes = !inQuotes;
                i++;
                continue;
            }
            if (ch === ',' && !inQuotes) {
                // End of field
                currentRow.push(currentField);
                currentField = "";
                i++;
                continue;
            }
            if (ch === '\n' && !inQuotes) {
                // End of row
                currentRow.push(currentField);
                rows.push(currentRow);
                currentRow = [];
                currentField = "";
                i++;
                continue;
            }
            // Normal character
            currentField += ch;
            i++;
        }
        // Push last field and row if any
        if (currentField !== "" || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        // Trim whitespace and remove outer quotes from each field
        return rows.map(row => row.map(field => field.trim().replace(/^"(.*)"$/, '$1')));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function fetchAndRenderExamples() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '<div class="status-msg">⏳ Fetching latest examples...</div>';

        try {
            const url = `${BASE_SCRIPT_URL}?format=csv&t=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();

            const rows = parseCSV(csvText);
            if (!rows || rows.length < 2) {
                container.innerHTML = '<div class="status-msg">📭 No examples submitted yet. Be the first!</div>';
                return;
            }

            const headers = rows[0];
            const dataRows = rows.slice(1);

            // Find column indices (case-insensitive)
            const getColIndex = (name) => headers.findIndex(h => h.toLowerCase().trim() === name.toLowerCase());
            const idxTimestamp = getColIndex('Timestamp');
            const idxFullName = getColIndex('FullName');
            const idxClass = getColIndex('Class');
            const idxIdea = getColIndex('Idea');
            const idxContext = getColIndex('ExampleContent'); // column name from sheet

            let html = '';
            let counter = 1;

            for (const row of dataRows) {
                const timestamp = idxTimestamp >= 0 ? row[idxTimestamp] || '' : '';
                const fullName = idxFullName >= 0 ? row[idxFullName] || '' : '';
                const className = idxClass >= 0 ? row[idxClass] || '' : '';
                const idea = idxIdea >= 0 ? row[idxIdea] || '' : '';
                let context = idxContext >= 0 ? row[idxContext] || '' : '';
                if (context.trim() === '') context = '— No context provided —';

                html += `
                    <div class="example-card">
                        <div class="card-header">📌 No. ${counter}</div>
                        <div class="card-field">
                            <span class="field-label">🕒 Time Stamp:</span>
                            <span class="field-value">${escapeHtml(timestamp)}</span>
                        </div>
                        <div class="card-field">
                            <span class="field-label">👤 Full Name:</span>
                            <span class="field-value">${escapeHtml(fullName)}</span>
                        </div>
                        <div class="card-field">
                            <span class="field-label">📚 Class:</span>
                            <span class="field-value">${escapeHtml(className)}</span>
                        </div>
                        <div class="card-field">
                            <span class="field-label">💡 Idea:</span>
                            <span class="field-value">${escapeHtml(idea)}</span>
                        </div>
                        <div class="card-field">
                            <span class="field-label">📎 Contexts:</span>
                            <span class="field-value ${context === '— No context provided —' ? 'empty' : ''}">${escapeHtml(context)}</span>
                        </div>
                    </div>
                `;
                counter++;
            }

            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="status-msg">⚠️ Failed to load data. Make sure your Apps Script returns CSV and is published.</div>';
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', fetchAndRenderExamples);
    fetchAndRenderExamples();
</script>
</body>
</html>
